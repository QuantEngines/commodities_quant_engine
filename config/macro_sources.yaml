# Macro Data Sources Configuration
# Free/public sources are enabled by default.
# Paid providers remain optional and disabled unless explicitly configured.

sources:
  official:
    name: "Official Macro Data"
    adapter_class: "data.ingestion.macro.providers.official_macro_adapter.OfficialMacroAdapter"
    enabled: true
    config:
      series_catalog:
        BALTIC_DRY_INDEX:
          source: "FRED"
          unit: "index"
          frequency: "daily"
        BALTIC_CAPESIZE_INDEX:
          source: "optional_local_proxy"
          unit: "index"
          frequency: "daily"
        BALTIC_PANAMAX_INDEX:
          source: "optional_local_proxy"
          unit: "index"
          frequency: "daily"
        BALTIC_SUPRAMAX_INDEX:
          source: "optional_local_proxy"
          unit: "index"
          frequency: "daily"
        BALTIC_DIRTY_TANKER_INDEX:
          source: "optional_local_proxy"
          unit: "index"
          frequency: "daily"
        BALTIC_CLEAN_TANKER_INDEX:
          source: "optional_local_proxy"
          unit: "index"
          frequency: "daily"
        LNG_CARRIER_RATE_PROXY:
          source: "optional_local_proxy"
          unit: "rate"
          frequency: "daily"
        BULKER_VESSEL_VALUE_PROXY:
          source: "optional_local_proxy"
          unit: "value"
          frequency: "daily"
        TANKER_VESSEL_VALUE_PROXY:
          source: "optional_local_proxy"
          unit: "value"
          frequency: "daily"
        LNG_CARRIER_VESSEL_VALUE_PROXY:
          source: "optional_local_proxy"
          unit: "value"
          frequency: "daily"
        CRUDE_OIL_VOLATILITY_INDEX:
          source: "FRED"
          unit: "index"
          frequency: "daily"
      event_calendar_catalog: {}
      allow_fred: true
      fred_series:
        BALTIC_DRY_INDEX: "BDIY"
        CRUDE_OIL_VOLATILITY_INDEX: "OVXCLS"

  generic_news:
    name: "Generic Free News"
    adapter_class: "data.ingestion.macro.providers.generic_news_adapter.GenericNewsAdapter"
    enabled: true
    config:
      allow_paid_sources: false
      rss_feeds:
        pib_economy: "https://pib.gov.in/RssMain.aspx?ModId=6&Lang=1&Regid=3"
        economic_times: "https://economictimes.indiatimes.com/rssfeedsdefault.cms"
      csv_paths:
        news_csv: ""

  bloomberg:
    name: "Bloomberg Terminal"
    adapter_class: "data.ingestion.macro.providers.bloomberg_adapter.BloombergMacroAdapter"
    enabled: false
    config:
      mock_mode: true

  reuters:
    name: "Reuters"
    adapter_class: "data.ingestion.macro.providers.reuters_adapter.ReutersMacroAdapter"
    enabled: false
    config:
      mock_mode: true
